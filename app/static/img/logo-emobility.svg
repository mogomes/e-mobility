<svg width="288" height="60" viewBox="0 0 288 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052e16"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- Icon: dark green rounded square -->
  <rect width="60" height="60" rx="15" fill="url(#iconGrad)"/>

  <!-- Rear wheel -->
  <circle cx="13.5" cy="46" r="9.5" fill="#071d10"/>
  <circle cx="13.5" cy="46" r="7.5" stroke="#86efac" stroke-width="2.2" fill="none"/>
  <circle cx="13.5" cy="46" r="3.2" fill="#22c55e"/>

  <!-- Front wheel -->
  <circle cx="47" cy="46" r="9.5" fill="#071d10"/>
  <circle cx="47" cy="46" r="7.5" stroke="#86efac" stroke-width="2.2" fill="none"/>
  <circle cx="47" cy="46" r="3.2" fill="#22c55e"/>

  <!-- Deck / footboard -->
  <rect x="9.5" y="34.5" width="24" height="5.5" rx="2.75" fill="#4ade80"/>

  <!-- Frame diagonal from deck to stem base -->
  <line x1="30.5" y1="35.5" x2="47" y2="25.5" stroke="#d1fae5" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Vertical stem -->
  <line x1="46.5" y1="25.5" x2="46.5" y2="11.5" stroke="#d1fae5" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Handlebars -->
  <line x1="39" y1="11.5" x2="54" y2="11.5" stroke="#4ade80" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Headlight dot on handlebar tip -->
  <circle cx="54" cy="11.5" r="2.2" fill="#fbbf24"/>

  <!-- Subtle accent glow top-left -->
  <circle cx="14" cy="16" r="5" fill="#22c55e" fill-opacity="0.2"/>

  <!-- Wordmark: dark text (works on white nav + footer inverts to white) -->
  <text
    x="76" y="27"
    fill="#0f172a"
    font-size="22"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="800"
    letter-spacing="-0.5">e-mobility</text>

  <!-- Tagline -->
  <text
    x="77" y="46"
    fill="#16a34a"
    font-size="11.5"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-weight="600"
    letter-spacing="1.4">E-SCOOTER · BERN</text>
</svg>
