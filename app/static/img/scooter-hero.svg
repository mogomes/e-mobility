<svg width="480" height="480" viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===================== BACKGROUND ACCENTS ===================== -->
  <circle cx="420" cy="70"  r="72" fill="#22c55e" fill-opacity="0.07"/>
  <circle cx="55"  cy="190" r="46" fill="#4ade80" fill-opacity="0.07"/>
  <circle cx="410" cy="395" r="32" fill="#bbf7d0" fill-opacity="0.06"/>

  <!-- Ground shadow -->
  <ellipse cx="240" cy="424" rx="182" ry="11" fill="#000" fill-opacity="0.20"/>

  <!-- ===================== REAR WHEEL ===================== -->
  <!-- Outer tyre -->
  <circle cx="96"  cy="354" r="62" fill="#091a0f"/>
  <!-- Tyre sidewall -->
  <circle cx="96"  cy="354" r="55" stroke="#0f2d18" stroke-width="4" fill="none"/>
  <!-- Rim ring -->
  <circle cx="96"  cy="354" r="47" stroke="url(#rimGrad)" stroke-width="3.5" fill="none"/>
  <!-- Inner hub plate -->
  <circle cx="96"  cy="354" r="26" fill="#0f2d18"/>
  <!-- Spokes -->
  <line x1="96" y1="328" x2="96"  y2="380" stroke="#1e4a2a" stroke-width="3"/>
  <line x1="70"  y1="354" x2="122" y2="354" stroke="#1e4a2a" stroke-width="3"/>
  <line x1="77"  y1="335" x2="115" y2="373" stroke="#1e4a2a" stroke-width="2.2"/>
  <line x1="115" y1="335" x2="77"  y2="373" stroke="#1e4a2a" stroke-width="2.2"/>
  <!-- Hub cap -->
  <circle cx="96"  cy="354" r="11" fill="#22c55e"/>
  <circle cx="96"  cy="354" r="5.5" fill="#16a34a"/>
  <circle cx="96"  cy="354" r="2"   fill="#052e16"/>

  <!-- ===================== FRONT WHEEL ===================== -->
  <!-- Outer tyre -->
  <circle cx="378" cy="354" r="62" fill="#091a0f"/>
  <!-- Tyre sidewall -->
  <circle cx="378" cy="354" r="55" stroke="#0f2d18" stroke-width="4" fill="none"/>
  <!-- Rim ring -->
  <circle cx="378" cy="354" r="47" stroke="url(#rimGrad)" stroke-width="3.5" fill="none"/>
  <!-- Inner hub plate -->
  <circle cx="378" cy="354" r="26" fill="#0f2d18"/>
  <!-- Spokes -->
  <line x1="378" y1="328" x2="378" y2="380" stroke="#1e4a2a" stroke-width="3"/>
  <line x1="352" y1="354" x2="404" y2="354" stroke="#1e4a2a" stroke-width="3"/>
  <line x1="359" y1="335" x2="397" y2="373" stroke="#1e4a2a" stroke-width="2.2"/>
  <line x1="397" y1="335" x2="359" y2="373" stroke="#1e4a2a" stroke-width="2.2"/>
  <!-- Hub cap -->
  <circle cx="378" cy="354" r="11" fill="#22c55e"/>
  <circle cx="378" cy="354" r="5.5" fill="#16a34a"/>
  <circle cx="378" cy="354" r="2"   fill="#052e16"/>

  <!-- ===================== FORK (front) ===================== -->
  <!-- Left fork leg -->
  <line x1="364" y1="240" x2="358" y2="310" stroke="#e2fcea" stroke-width="9" stroke-linecap="round"/>
  <!-- Right fork leg -->
  <line x1="384" y1="240" x2="390" y2="310" stroke="#e2fcea" stroke-width="9" stroke-linecap="round"/>
  <!-- Fork bridge -->
  <line x1="360" y1="272" x2="388" y2="272" stroke="#bbf7d0" stroke-width="6" stroke-linecap="round"/>

  <!-- ===================== MAIN FRAME ===================== -->
  <!-- Frame from deck junction to stem base, with width -->
  <path d="M278 278 C312 270 346 256 370 240"
        stroke="#e6fff0" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Secondary thinner highlight on frame -->
  <path d="M278 274 C312 266 346 252 370 236"
        stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- ===================== DECK / FOOTBOARD ===================== -->
  <!-- Main deck body -->
  <rect x="90" y="276" width="198" height="24" rx="12" fill="url(#bodyGrad)"/>
  <!-- Deck bottom edge highlight -->
  <rect x="96" y="296" width="186" height="3" rx="1.5" fill="#22c55e" fill-opacity="0.65"/>
  <!-- Battery / motor housing on deck -->
  <rect x="126" y="268" width="118" height="20" rx="8" fill="#dcfce7"/>
  <!-- Housing detail line -->
  <line x1="135" y1="278" x2="234" y2="278" stroke="#bbf7d0" stroke-width="1.5"/>

  <!-- Rear brake/tail light -->
  <rect x="87" y="278" width="7" height="20" rx="3.5" fill="#ef4444" fill-opacity="0.85"/>

  <!-- ===================== STEM ===================== -->
  <!-- Stem body -->
  <rect x="362" y="72" width="20" height="170" rx="10" fill="url(#bodyGrad)"/>
  <!-- Stem highlight stripe -->
  <rect x="369" y="78" width="5" height="158" rx="2.5" fill="#ffffff" fill-opacity="0.3"/>
  <!-- Folding hinge detail at stem middle -->
  <rect x="360" y="188" width="24" height="14" rx="7" fill="#d1fae5"/>
  <circle cx="372" cy="195" r="3.5" fill="#16a34a"/>

  <!-- ===================== HANDLEBARS ===================== -->
  <!-- Bar tube -->
  <rect x="306" y="72" width="132" height="20" rx="10" fill="#d1fae5"/>
  <!-- Bar highlight -->
  <rect x="312" y="74" width="120" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>
  <!-- Left grip -->
  <rect x="302" y="70" width="20" height="26" rx="8" fill="#4ade80"/>
  <rect x="304" y="73" width="6" height="20" rx="3" fill="#22c55e" fill-opacity="0.45"/>
  <!-- Right grip -->
  <rect x="418" y="70" width="20" height="26" rx="8" fill="#4ade80"/>
  <rect x="430" y="73" width="6" height="20" rx="3" fill="#22c55e" fill-opacity="0.45"/>

  <!-- ===================== DISPLAY ===================== -->
  <rect x="346" y="87" width="44" height="34" rx="9" fill="#031a0d"/>
  <rect x="349" y="90" width="38" height="28" rx="7" fill="#073b20"/>
  <!-- Speed digit (stylised "25") -->
  <text x="352" y="109" fill="#22c55e" font-size="15" font-family="monospace" font-weight="700">25</text>
  <!-- Unit label -->
  <text x="371" y="112" fill="#4ade80" font-size="7" font-family="monospace" fill-opacity="0.7">km/h</text>

  <!-- ===================== HEADLIGHT ===================== -->
  <!-- Outer glow -->
  <circle cx="433" cy="82" r="11" fill="#fef3c7" fill-opacity="0.3"/>
  <!-- Lens -->
  <circle cx="433" cy="82" r="8"  fill="#fffbeb"/>
  <!-- Filament -->
  <circle cx="433" cy="82" r="5"  fill="#fbbf24"/>
  <circle cx="433" cy="82" r="2.5" fill="#f59e0b"/>

  <!-- ===================== FRONT FENDER ===================== -->
  <path d="M344 240 Q306 292 322 354"
        stroke="#d1fae5" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- ===================== REAR FENDER ===================== -->
  <path d="M93 276 Q60 306 68 354"
        stroke="#d1fae5" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- ===================== KICKSTAND ===================== -->
  <line x1="202" y1="298" x2="188" y2="340" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>
  <line x1="188" y1="340" x2="176" y2="340" stroke="#86efac" stroke-width="5" stroke-linecap="round"/>

  <!-- ===================== DECORATIVE SPARKLES ===================== -->
  <!-- Large sparkle top right -->
  <path d="M436 158 L438.5 151 L441 158 L448 160.5 L441 163 L438.5 170 L436 163 L429 160.5 Z"
        fill="#4ade80" fill-opacity="0.55"/>
  <!-- Small sparkle left -->
  <path d="M68 122 L69.8 117 L71.6 122 L76.6 123.8 L71.6 125.6 L69.8 130.6 L68 125.6 L63 123.8 Z"
        fill="#86efac" fill-opacity="0.45"/>
  <!-- Tiny dot accents -->
  <circle cx="452" cy="230" r="3.5" fill="#22c55e" fill-opacity="0.4"/>
  <circle cx="56"  cy="300" r="2.5" fill="#4ade80"  fill-opacity="0.35"/>
  <circle cx="440" cy="300" r="2"   fill="#bbf7d0"  fill-opacity="0.4"/>
</svg>
